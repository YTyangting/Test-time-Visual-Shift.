DATALOADER:
  TRAIN_X:
    BATCH_SIZE: 32
  TEST:
    BATCH_SIZE: 1
  NUM_WORKERS: 12

INPUT:
  SIZE: (224, 224)
  INTERPOLATION: "bicubic"
  PIXEL_MEAN: [0.48145466, 0.4578275, 0.40821073]
  PIXEL_STD: [0.26862954, 0.26130258, 0.27577711]
  TRANSFORMS: ["random_resized_crop", "random_flip", "normalize"]

OPTIM:
  NAME: "sgd"
  LR: 0.002
  MAX_EPOCH: 200
  LR_SCHEDULER: "cosine"
  WARMUP_EPOCH: 1
  WARMUP_TYPE: "constant"
  WARMUP_CONS_LR: 1e-5

TRAIN:
  PRINT_FREQ: 5

MODEL:
  BACKBONE:
    NAME: "RN50"

TRAINER:
  TVS:
    N_CTX_VISION: 2  # number of contex vectors
    N_CTX_TEXT: 4
    CTX_INIT : "a photo of a" 
    PREC : "amp"  # fp16, fp32, amp
    
  # 4e-2 
#Prec
TPT:
  LOADER: True
  LR: 3e-2
  RUN: True
  TTA_STEPS: 1
  TPT_THRESHOLD: 0.1
  TPT_LOSS: True
#0.5 0.1 l l2